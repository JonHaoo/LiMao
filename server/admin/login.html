<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>荔猫AI · 管理员登录</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/login.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="auth-brand-icon">L</span>
      <span class="auth-brand-name">荔猫AI · 管理后台</span>
    </div>
    <p class="auth-desc">登录以管理预约演示申请</p>

    <div class="auth-tabs">
      <button class="auth-tab is-active" data-tab="login">登录</button>
      <button class="auth-tab" data-tab="register">注册</button>
    </div>

    <!-- Login Form -->
    <form class="auth-form" id="loginForm">
      <div class="auth-field">
        <label class="auth-label">用户名</label>
        <input class="auth-input" type="text" id="loginUsername" placeholder="请输入用户名" autocomplete="username" required>
      </div>
      <div class="auth-field">
        <label class="auth-label">密码</label>
        <input class="auth-input" type="password" id="loginPassword" placeholder="请输入密码" autocomplete="current-password" required>
      </div>
      <button class="auth-btn" type="submit">登 录</button>
      <p class="auth-error" id="loginError"></p>
    </form>

    <!-- Register Form -->
    <form class="auth-form is-hidden" id="registerForm">
      <div class="auth-field">
        <label class="auth-label">用户名</label>
        <input class="auth-input" type="text" id="regUsername" placeholder="请设置用户名" autocomplete="username" required>
      </div>
      <div class="auth-field">
        <label class="auth-label">邮箱</label>
        <input class="auth-input" type="email" id="regEmail" placeholder="请输入邮箱" autocomplete="email" required>
      </div>
      <div class="auth-field">
        <label class="auth-label">密码</label>
        <input class="auth-input" type="password" id="regPassword" placeholder="至少6位密码" autocomplete="new-password" required minlength="6">
      </div>
      <div class="auth-field">
        <label class="auth-label">确认密码</label>
        <input class="auth-input" type="password" id="regConfirm" placeholder="再次输入密码" autocomplete="new-password" required>
      </div>
      <button class="auth-btn" type="submit">注 册</button>
      <p class="auth-error" id="regError"></p>
    </form>
  </div>
</div>
<script type="module" src="/admin/login.js"></script>
</body>
</html>
